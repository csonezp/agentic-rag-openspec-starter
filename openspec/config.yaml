schema: spec-driven

context: |
  本项目用于学习并构建一个接近生产标准的内部知识库 Agent。
  面向人的项目文档、进度文档、学习笔记、运行手册和任务记录统一使用中文。
  代码标识符、包名、命令、环境变量名和第三方 API 名称保持英文。
  当前优先使用 Python-only 原型，后续需要 UI 或管理后台时再引入 Node.js。
  docs/agent-learning-todo.md 是总路线图；openspec/changes/ 管理每个阶段的详细上下文。

rules:
  proposal:
    - 使用中文描述背景、范围和成功标准。
    - 明确写出不做什么，避免范围漂移。
  design:
    - 使用中文记录技术方案、取舍、边界和风险。
    - 优先选择最小可验证方案。
  tasks:
    - 使用中文任务项。
    - 每个任务应能通过测试、脚本运行、文档检查或人工检查验证。
